<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/estilo.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <title>Login</title>
</head>
<body>
    <main>
        <section>
            <div id="foto"></div>
            <div id="formulario">
                <h1>Login</h1>
                <p>
                    Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.
                </p>
                <form action="login.php" method="post" autocomplete="on">
                    <p class="registro">
                        <i class="material-symbols-outlined">Person</i>
                        <input type="email" name="email" id="iemail" placeholder="Seu e-mail" required autocomplete="email">
                    </p>
                    <p class="registro">
                        <i class="material-symbols-outlined">Key</i>
                        <input type="password" name="senha" id="isenha" autocomplete="current-password" placeholder="Sua senha" minlength="8" required>
                    </p>
                    <p class="botao">
                        <input type="submit" value="Entrar">
                        <button><a href="esqueci_senha.html">Esqueci a senha <i class="material-symbols-outlined">Mail</i></a></button>
                    </p>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
