<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/estilo.css">
    <title>Meu login</title>
</head>
<body>
    <main>
        <section class="imagem"></section>

        <section class="formulario">
            <div class="texto">
                <h1>Login</h1>
                <p>
                    Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.
                </p>
            </div>
            <form action="login.php" method="post" autocomplete="on">
                <div class="cadastro">
                    <p>
                        <i class="material-symbols-outlined">Person</i>
                        <input type="email" name="email" id="iemail" autocomplete="email" placeholder="Seu e-mail">
                    </p>
                    <p>
                        <i class="material-symbols-outlined">Key</i>
                        <input type="password" name="senha" id="isenha" autocomplete="current-password" minlength="8" placeholder="Sua senha">
                    </p>
                </div>
                <div class="botoes">
                    <input type="submit" value="Entrar">
                    <button><a href="#">Esqueci a senha<i class="material-symbols-outlined">Mail</i></a></button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
